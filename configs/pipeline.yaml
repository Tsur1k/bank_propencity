data:
  path: "data/bank-additional-full.csv"
  test_size: 0.2
  random_state: 42

model:
  n_trials: 50
  cv_folds: 5
  optimize_metric: "roc_auc"
  optuna_params:
    n_estimators:
      low: 100
      high: 1000
      step: 100
    learning_rate:
      low: 0.01
      high: 0.2
    max_depth:
      low: 3
      high: 12
    num_leaves:
      low: 20
      high: 150
    min_child_samples:
      low: 5
      high: 50
    subsample:
      low: 0.6
      high: 1.0
    colsample_bytree:
      low: 0.6
      high: 1.0
    class_weight:
      values:
        - "balanced"
        - null

logging:
  level: "INFO"
  format: "json"