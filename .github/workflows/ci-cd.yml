name: bank propencity

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.10"
  UV_VERSION: "0.4.0"

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ -v --cov=src --cov-report=xml --cov-report=term --ignore=tests/test_pipeline.py
        env:
          MLFLOW_TRACKING_URI: file:///tmp/mlruns
          PYTHONPATH: ${{ github.workspace }}

  docker-build:
    runs-on: ubuntu-latest
    needs: quality-checks
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t propensity-ml:${{ github.sha }} .

      - name: Run smoke test in container
        run: |
          docker run --rm propensity-ml:${{ github.sha }} \
            python -c "from src.config import PipelineConfig; print('Import OK')"

      - name: Save Docker image (optional, for caching)
        run: docker save propensity-ml:${{ github.sha }} | gzip > propensity-ml.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: propensity-ml.tar.gz
          retention-days: 1

  deploy-staging:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: gunzip -c propensity-ml.tar.gz | docker load

      - name: Deploy to staging (placeholder)
        run: |
          echo "Deployment to staging environment would happen here"
          echo "In production, this would push to a registry and update Kubernetes/ECR"